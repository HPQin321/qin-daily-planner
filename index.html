<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0"/>
  <title>秦老师的备忘本</title>
  <style>
    :root {
      --bg: #f4f6f3;
      --card: #ffffff;
      --accent: #4a7c59;
      --accent-light: #e8f4ed;
      --accent2: #c0794a;
      --text: #2d2d2d;
      --text-muted: #999;
      --border: #e0ddd6;
      --shadow: 0 2px 12px rgba(0,0,0,0.07);
      --radius: 12px;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'PingFang SC','Microsoft YaHei','Segoe UI',sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      padding-bottom: 60px;
    }

    /* ── 顶部 header ── */
    .top-header {
      background: var(--accent);
      color: #fff;
      padding: 18px 24px 0;
      display: flex;
      flex-direction: column;
      align-items: center;
    }
    .top-header-row {
      width: 100%; max-width: 900px;
      display: flex; align-items: center; gap: 12px;
      margin-bottom: 14px;
    }
    .top-header .avatar {
      width: 40px; height: 40px; background: rgba(255,255,255,0.2);
      border-radius: 50%; display: flex; align-items: center;
      justify-content: center; font-size: 20px;
    }
    .top-header h1 { font-size: 20px; font-weight: 700; }
    .top-header p { font-size: 12px; opacity: 0.75; margin-top: 2px; }

    /* ── 视图切换 tab ── */
    .view-tabs {
      display: flex; gap: 0;
      background: rgba(0,0,0,0.15);
      border-radius: 10px 10px 0 0;
      overflow: hidden;
    }
    .view-tab {
      padding: 9px 28px;
      font-size: 14px; font-weight: 600;
      cursor: pointer; color: rgba(255,255,255,0.7);
      transition: background 0.15s, color 0.15s;
      border: none; background: none;
    }
    .view-tab.active {
      background: var(--card);
      color: var(--accent);
      border-radius: 10px 10px 0 0;
    }
    .view-tab:hover:not(.active) { color: #fff; }

    /* ── 主体内容区 ── */
    .main { max-width: 900px; margin: 0 auto; padding: 20px 16px; }

    /* ────────────────────────────────────────────────
       日视图
    ──────────────────────────────────────────────── */
    .date-nav {
      display: flex; align-items: center; gap: 8px; margin-bottom: 16px; flex-wrap: wrap;
    }
    .nav-btn {
      background: var(--card); border: 1px solid var(--border);
      border-radius: 8px; padding: 6px 14px; cursor: pointer;
      font-size: 14px; color: var(--text); transition: background 0.15s;
    }
    .nav-btn:hover { background: var(--accent-light); }
    .nav-btn.today-btn {
      background: var(--accent); color: #fff; border-color: var(--accent); font-weight: 600;
    }
    .nav-btn.today-btn:hover { opacity: 0.88; }
    .date-display { font-size: 17px; font-weight: 700; flex: 1; text-align: center; }
    #date-picker { border: 1px solid var(--border); border-radius: 8px; padding: 6px 10px; font-size: 14px; background: var(--card); color: var(--text); cursor: pointer; }

    .stats-bar { display: flex; gap: 10px; flex-wrap: wrap; margin-bottom: 16px; }
    .stat-chip {
      background: var(--card); border: 1px solid var(--border);
      border-radius: 20px; padding: 5px 14px; font-size: 13px; color: var(--text-muted);
    }
    .stat-chip span { font-weight: 700; color: var(--accent); }

    .add-card {
      background: var(--card); border-radius: var(--radius);
      box-shadow: var(--shadow); padding: 18px; margin-bottom: 20px;
    }
    .add-card h2 { font-size: 13px; font-weight: 600; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.05em; margin-bottom: 12px; }
    .input-row { display: flex; gap: 8px; flex-wrap: wrap; align-items: center; }
    .input-row input[type="time"] { border: 1px solid var(--border); border-radius: 8px; padding: 8px 10px; font-size: 16px; width: 120px; background: var(--bg); color: var(--text); }
    .input-row input[type="text"] { flex: 1; min-width: 160px; border: 1px solid var(--border); border-radius: 8px; padding: 8px 12px; font-size: 16px; background: var(--bg); color: var(--text); }
    .input-row input:focus { outline: none; border-color: var(--accent); box-shadow: 0 0 0 3px rgba(74,124,89,0.12); }
    .color-picks { display: flex; gap: 5px; align-items: center; }
    .color-dot { width: 22px; height: 22px; border-radius: 50%; cursor: pointer; border: 2px solid transparent; transition: transform 0.13s, border-color 0.13s; }
    .color-dot:hover, .color-dot.selected { transform: scale(1.2); border-color: var(--text); }
    .add-btn { background: var(--accent); color: #fff; border: none; border-radius: 8px; padding: 8px 20px; font-size: 14px; font-weight: 600; cursor: pointer; white-space: nowrap; }
    .add-btn:hover { opacity: 0.88; }

    /* 时间轴 */
    .timeline {}
    .empty-state { text-align: center; padding: 48px 20px; color: var(--text-muted); font-size: 14px; }
    .empty-state .emoji { font-size: 38px; margin-bottom: 10px; }
    .event-item { display: flex; margin-bottom: 5px; }
    .time-col { width: 68px; flex-shrink: 0; padding-top: 14px; text-align: right; padding-right: 14px; font-size: 12px; font-weight: 600; color: var(--text-muted); position: relative; }
    .time-col::after { content:''; position:absolute; right:-1px; top:20px; width:9px; height:9px; border-radius:50%; background:var(--accent); border:2px solid var(--bg); z-index:1; }
    .line-col { width: 2px; background: var(--border); flex-shrink: 0; }
    .event-item:last-child .line-col { background: linear-gradient(to bottom, var(--border), transparent); }
    .event-card {
      flex: 1; margin: 7px 0 7px 14px; background: var(--card); border-radius: 10px;
      box-shadow: var(--shadow); padding: 10px 14px; border-left: 4px solid var(--accent);
      display: flex; align-items: flex-start; gap: 8px; transition: box-shadow 0.15s;
    }
    .event-card:hover { box-shadow: 0 4px 18px rgba(0,0,0,0.11); }
    .event-card.done { opacity: 0.48; }
    .event-card.done .event-text { text-decoration: line-through; }
    .event-body { flex: 1; }
    .event-text { font-size: 14px; font-weight: 500; line-height: 1.5; }
    .event-note { font-size: 12px; color: #aaa; margin-top: 3px; }
    .event-actions { display: flex; gap: 3px; flex-shrink: 0; }
    .icon-btn { background: none; border: none; cursor: pointer; padding: 3px 5px; border-radius: 6px; font-size: 14px; color: var(--text-muted); transition: background 0.12s, color 0.12s; }
    .icon-btn:hover { background: var(--accent-light); color: var(--accent); }
    .icon-btn.del-btn:hover { background: #fde8e8; color: #c0392b; }

    /* ────────────────────────────────────────────────
       周视图
    ──────────────────────────────────────────────── */
    .week-nav { display: flex; align-items: center; gap: 8px; margin-bottom: 16px; }
    .week-display { font-size: 16px; font-weight: 700; flex: 1; text-align: center; }

    .week-grid {
      display: grid;
      grid-template-columns: repeat(7, 1fr);
      gap: 6px;
    }
    .week-day-col {
      background: var(--card); border-radius: var(--radius);
      box-shadow: var(--shadow); overflow: hidden; min-height: 180px;
    }
    .week-day-header {
      padding: 8px 6px; text-align: center; font-size: 12px; font-weight: 700;
      background: var(--accent-light); color: var(--accent); border-bottom: 1px solid var(--border);
    }
    .week-day-header.today-col { background: var(--accent); color: #fff; }
    .week-day-header .day-num { font-size: 18px; font-weight: 800; display: block; }
    .week-day-header .day-name { font-size: 11px; }
    .week-events { padding: 6px; min-height: 140px; }
    .week-event-chip {
      display: block; width: 100%; text-align: left; font-size: 11px; border: none;
      border-radius: 5px; padding: 4px 6px; margin-bottom: 4px; cursor: pointer;
      color: #fff; font-weight: 500; line-height: 1.4; word-break: break-all;
    }
    .week-event-chip.done-chip { opacity: 0.45; text-decoration: line-through; }
    .week-add-btn {
      display: block; width: 100%; background: none; border: 1px dashed var(--border);
      border-radius: 6px; color: var(--text-muted); font-size: 12px; padding: 4px;
      cursor: pointer; margin-top: 2px;
    }
    .week-add-btn:hover { background: var(--accent-light); color: var(--accent); border-color: var(--accent); }

    @media (max-width: 640px) {
      .week-grid { grid-template-columns: repeat(4, 1fr); }
    }
    @media (max-width: 420px) {
      .week-grid { grid-template-columns: repeat(2, 1fr); }
    }

    /* ────────────────────────────────────────────────
       月视图
    ──────────────────────────────────────────────── */
    .month-nav { display: flex; align-items: center; gap: 8px; margin-bottom: 16px; }
    .month-display { font-size: 18px; font-weight: 700; flex: 1; text-align: center; }

    .month-weekdays {
      display: grid; grid-template-columns: repeat(7,1fr);
      gap: 4px; margin-bottom: 4px;
    }
    .month-weekday { text-align: center; font-size: 12px; font-weight: 700; color: var(--text-muted); padding: 4px; }

    .month-grid { display: grid; grid-template-columns: repeat(7,1fr); gap: 4px; }
    .month-cell {
      background: var(--card); border-radius: 8px; min-height: 90px;
      padding: 6px; cursor: pointer; transition: box-shadow 0.14s; position: relative;
      box-shadow: var(--shadow);
    }
    .month-cell:hover { box-shadow: 0 4px 16px rgba(0,0,0,0.12); }
    .month-cell.other-month { opacity: 0.38; }
    .month-cell.today-cell { outline: 2px solid var(--accent); }
    .month-day-num {
      font-size: 14px; font-weight: 700; margin-bottom: 4px;
      width: 26px; height: 26px; display: flex; align-items: center; justify-content: center;
      border-radius: 50%;
    }
    .month-cell.today-cell .month-day-num { background: var(--accent); color: #fff; }
    .month-dot-list { display: flex; flex-direction: column; gap: 2px; }
    .month-dot {
      font-size: 10px; border-radius: 3px; padding: 1px 4px;
      color: #fff; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; max-width: 100%;
    }
    .month-dot.done-dot { opacity: 0.45; }
    .month-more { font-size: 10px; color: var(--text-muted); margin-top: 2px; }

    /* ────────────────────────────────────────────────
       通用弹窗
    ──────────────────────────────────────────────── */
    .modal-overlay { display:none; position:fixed; inset:0; background:rgba(0,0,0,0.35); z-index:200; align-items:center; justify-content:center; }
    .modal-overlay.show { display:flex; }
    .modal { background:var(--card); border-radius:var(--radius); padding:24px; width:100%; max-width:400px; box-shadow:0 8px 40px rgba(0,0,0,0.18); margin:16px; }
    .modal h3 { font-size:16px; font-weight:700; margin-bottom:16px; }
    .modal label { display:block; font-size:12px; color:var(--text-muted); margin-bottom:5px; margin-top:12px; font-weight:600; }
    .modal input[type="date"], .modal input[type="time"], .modal input[type="text"], .modal textarea {
      width:100%; border:1px solid var(--border); border-radius:8px; padding:8px 10px; font-size:16px; background:var(--bg); color:var(--text); font-family:inherit;
    }
    .modal input:focus, .modal textarea:focus { outline:none; border-color:var(--accent); }
    .modal textarea { resize:vertical; min-height:60px; }
    .modal-btns { display:flex; gap:8px; margin-top:18px; justify-content:flex-end; }
    .modal-btns button { border:none; border-radius:8px; padding:8px 20px; font-size:14px; font-weight:600; cursor:pointer; }
    .cancel-btn { background:var(--bg); color:var(--text-muted); }
    .save-btn { background:var(--accent); color:#fff; }
    .save-btn:hover { opacity:0.88; }
    .del-event-btn { background:#fde8e8; color:#c0392b; margin-right:auto; }

    /* 月日详情弹窗 */
    .day-detail-modal { max-width: 480px; }
    .day-detail-list { max-height: 300px; overflow-y: auto; margin-top: 8px; }
    .detail-item { display:flex; align-items:center; gap:8px; padding: 8px 0; border-bottom:1px solid var(--border); }
    .detail-item:last-child { border-bottom: none; }
    .detail-time { font-size:12px; font-weight:700; color:var(--text-muted); width:40px; flex-shrink:0; }
    .detail-text { flex:1; font-size:14px; }
    .detail-text.done-text { text-decoration:line-through; opacity:0.5; }
    .detail-actions { display:flex; gap:3px; }

    /* 周计划弹窗（添加时）*/
    .week-plan-modal { max-width:420px; }

    /* 月计划标注 */
    .month-plan-badge {
      position: absolute; top: 5px; right: 5px;
      width: 8px; height: 8px; border-radius: 50%; background: var(--accent2);
    }
  </style>
</head>
<body>

<!-- ── 顶部 ── -->
<div class="top-header">
  <div class="top-header-row">
    <div class="avatar">📋</div>
    <div>
      <h1>秦老师的备忘本</h1>
      <p>日计划 · 周计划 · 月计划 · 数据本地存储</p>
    </div>
  </div>
  <div class="view-tabs">
    <button class="view-tab active" onclick="switchView('day')">📅 日计划</button>
    <button class="view-tab" onclick="switchView('week')">🗓 周计划</button>
    <button class="view-tab" onclick="switchView('month')">📆 月计划</button>
  </div>
</div>

<!-- ══════════════════════════════════════
     日视图
══════════════════════════════════════ -->
<div class="main" id="view-day">
  <div class="date-nav">
    <button class="nav-btn" onclick="changeDay(-1)">‹ 昨天</button>
    <div class="date-display" id="day-date-display"></div>
    <button class="nav-btn" onclick="changeDay(1)">明天 ›</button>
    <input type="date" id="date-picker" onchange="pickDate(this.value)"/>
    <button class="nav-btn today-btn" onclick="goToday()">今天</button>
  </div>
  <div class="stats-bar">
    <div class="stat-chip">今日 <span id="stat-total">0</span> 条</div>
    <div class="stat-chip">已完成 <span id="stat-done">0</span> 条</div>
  </div>
  <div class="add-card">
    <h2>＋ 添加事项</h2>
    <div class="input-row">
      <input type="time" id="inp-time" placeholder="HH:MM"/>
      <input type="text" id="inp-text" placeholder="事项内容，如：备课 / 组会 / 批改作业…"/>
      <div class="color-picks" id="color-picks"></div>
      <button class="add-btn" onclick="addDayEvent()">添加</button>
    </div>
  </div>
  <div class="timeline" id="timeline"></div>
</div>

<!-- ══════════════════════════════════════
     周视图
══════════════════════════════════════ -->
<div class="main" id="view-week" style="display:none">
  <div class="week-nav">
    <button class="nav-btn" onclick="changeWeek(-1)">‹ 上周</button>
    <div class="week-display" id="week-display"></div>
    <button class="nav-btn" onclick="changeWeek(1)">下周 ›</button>
    <button class="nav-btn today-btn" onclick="goWeekToday()">本周</button>
  </div>

  <!-- 周备注区 -->
  <div class="add-card" style="margin-bottom:14px;">
    <h2>📝 本周备注</h2>
    <textarea id="week-note-area" rows="2"
      style="width:100%;border:1px solid var(--border);border-radius:8px;padding:8px 12px;font-size:14px;background:var(--bg);color:var(--text);font-family:inherit;resize:vertical;"
      placeholder="本周重点目标、注意事项…"
      oninput="saveWeekNote()"></textarea>
  </div>

  <div class="week-grid" id="week-grid"></div>
</div>

<!-- ══════════════════════════════════════
     月视图
══════════════════════════════════════ -->
<div class="main" id="view-month" style="display:none">
  <div class="month-nav">
    <button class="nav-btn" onclick="changeMonth(-1)">‹ 上月</button>
    <div class="month-display" id="month-display"></div>
    <button class="nav-btn" onclick="changeMonth(1)">下月 ›</button>
    <button class="nav-btn today-btn" onclick="goMonthToday()">本月</button>
  </div>

  <!-- 月备注区 -->
  <div class="add-card" style="margin-bottom:14px;">
    <h2>📝 本月备注</h2>
    <textarea id="month-note-area" rows="2"
      style="width:100%;border:1px solid var(--border);border-radius:8px;padding:8px 12px;font-size:14px;background:var(--bg);color:var(--text);font-family:inherit;resize:vertical;"
      placeholder="本月重要里程碑、目标、提醒…"
      oninput="saveMonthNote()"></textarea>
  </div>

  <div class="month-weekdays" id="month-weekdays"></div>
  <div class="month-grid" id="month-grid"></div>
</div>

<!-- ══════════════════════════════════════
     通用编辑弹窗（添加/编辑 事项）
══════════════════════════════════════ -->
<div class="modal-overlay" id="event-modal">
  <div class="modal">
    <h3 id="event-modal-title">✏️ 事项</h3>
    <label>日期</label>
    <input type="date" id="em-date"/>
    <label>时间</label>
    <input type="time" id="em-time"/>
    <label>内容</label>
    <input type="text" id="em-text" placeholder="事项内容"/>
    <label>备注（可选）</label>
    <textarea id="em-note" placeholder="补充说明…"></textarea>
    <label>颜色</label>
    <div class="color-picks" id="em-color-picks" style="margin-top:4px;"></div>
    <div class="modal-btns">
      <button class="del-event-btn" id="em-del-btn" onclick="deleteModalEvent()" style="display:none">删除</button>
      <button class="cancel-btn" onclick="closeEventModal()">取消</button>
      <button class="save-btn" onclick="saveEventModal()">保存</button>
    </div>
  </div>
</div>

<!-- 月/日 详情弹窗 -->
<div class="modal-overlay" id="day-detail-modal">
  <div class="modal day-detail-modal">
    <h3 id="dd-title"></h3>
    <div class="day-detail-list" id="dd-list"></div>
    <div class="modal-btns" style="margin-top:14px;">
      <button class="add-btn" onclick="openAddFromDetail()">＋ 添加</button>
      <button class="cancel-btn" onclick="closeDayDetail()">关闭</button>
    </div>
  </div>
</div>

<script>
// ══════════════════════════════════════════════════════════
// 常量 & 工具
// ══════════════════════════════════════════════════════════
const COLORS = [
  { bg:'#4a7c59', label:'绿' },
  { bg:'#c0794a', label:'橙' },
  { bg:'#3a7ab5', label:'蓝' },
  { bg:'#9b59b6', label:'紫' },
  { bg:'#c0392b', label:'红' },
  { bg:'#888',    label:'灰' },
];
const WEEKDAYS_CN = ['日','一','二','三','四','五','六'];
const WEEKDAYS_EN = ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];

function todayStr(){ return new Date().toISOString().slice(0,10); }
function dateAdd(d, n){
  const dt = new Date(d+'T00:00:00');
  dt.setDate(dt.getDate()+n);
  return dt.toISOString().slice(0,10);
}
function formatDateCN(d){
  const dt = new Date(d+'T00:00:00');
  return `${dt.getFullYear()}年${dt.getMonth()+1}月${dt.getDate()}日  周${WEEKDAYS_CN[dt.getDay()]}`;
}
function escHtml(s){ return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }

// 数据（兼容 Safari file:// 下 localStorage 可能抛出安全异常）
var _store = (function(){
  try {
    localStorage.setItem('__test__','1');
    localStorage.removeItem('__test__');
    return localStorage;
  } catch(e) {
    // Safari 隐私模式或 file:// 下降级为内存存储
    var mem = {};
    return {
      getItem: function(k){ return mem.hasOwnProperty(k) ? mem[k] : null; },
      setItem: function(k,v){ mem[k]=String(v); },
      removeItem: function(k){ delete mem[k]; }
    };
  }
})();

function eventKey(date){ return 'planner_'+date; }
function loadEvents(date){
  try { return JSON.parse(_store.getItem(eventKey(date))||'[]'); }
  catch(e) { return []; }
}
function saveEventsArr(date, arr){
  arr.sort(function(a,b){ return a.time.localeCompare(b.time); });
  _store.setItem(eventKey(date), JSON.stringify(arr));
}

function weekNoteKey(mon,week){ return 'week_note_'+mon+'_'+week; }
function monthNoteKey(ym){ return 'month_note_'+ym; }
// 注：所有 localStorage 读写统一使用 _store（见上方定义）

// ══════════════════════════════════════════════════════════
// 视图切换
// ══════════════════════════════════════════════════════════
let currentView = 'day';
function switchView(v){
  currentView = v;
  ['day','week','month'].forEach(n=>{
    document.getElementById('view-'+n).style.display = n===v ? '' : 'none';
  });
  document.querySelectorAll('.view-tab').forEach((el,i)=>{
    el.classList.toggle('active', ['day','week','month'][i]===v);
  });
  if(v==='day') renderDay();
  if(v==='week') renderWeek();
  if(v==='month') renderMonth();
}

// ══════════════════════════════════════════════════════════
// 颜色选择器（复用）
// ══════════════════════════════════════════════════════════
let dayColor=0, modalColor=0;

function buildColorPicker(containerId, getColor, setColor){
  const el = document.getElementById(containerId);
  el.innerHTML='';
  COLORS.forEach((c,i)=>{
    const d=document.createElement('div');
    d.className='color-dot'+(i===getColor()?' selected':'');
    d.style.background=c.bg;
    d.title=c.label;
    d.onclick=()=>{
      setColor(i);
      el.querySelectorAll('.color-dot').forEach((dd,j)=>dd.classList.toggle('selected',j===i));
    };
    el.appendChild(d);
  });
}
// 日视图颜色
buildColorPicker('color-picks', ()=>dayColor, v=>{ dayColor=v; });

// 弹窗颜色
function buildModalColorPicker(selected){
  modalColor = selected;
  const el = document.getElementById('em-color-picks');
  el.innerHTML='';
  COLORS.forEach((c,i)=>{
    const d=document.createElement('div');
    d.className='color-dot'+(i===selected?' selected':'');
    d.style.background=c.bg;
    d.title=c.label;
    d.onclick=()=>{
      modalColor=i;
      el.querySelectorAll('.color-dot').forEach((dd,j)=>dd.classList.toggle('selected',j===i));
    };
    el.appendChild(d);
  });
}

// ══════════════════════════════════════════════════════════
// 通用事项弹窗
// ══════════════════════════════════════════════════════════
let modalMode='add', modalEditDate='', modalEditId=null;

function openAddEventModal(date, prefillTime){
  modalMode='add'; modalEditDate=date; modalEditId=null;
  document.getElementById('event-modal-title').textContent='＋ 添加事项';
  document.getElementById('em-date').value=date||todayStr();
  document.getElementById('em-time').value=prefillTime||defaultTimeStr();
  document.getElementById('em-text').value='';
  document.getElementById('em-note').value='';
  document.getElementById('em-del-btn').style.display='none';
  buildModalColorPicker(0);
  document.getElementById('event-modal').classList.add('show');
  setTimeout(()=>document.getElementById('em-text').focus(),100);
}

function openEditEventModal(date, id){
  const ev = loadEvents(date).find(e=>e.id===id);
  if(!ev) return;
  modalMode='edit'; modalEditDate=date; modalEditId=id;
  document.getElementById('event-modal-title').textContent='✏️ 编辑事项';
  document.getElementById('em-date').value=date;
  document.getElementById('em-time').value=ev.time;
  document.getElementById('em-text').value=ev.text;
  document.getElementById('em-note').value=ev.note||'';
  document.getElementById('em-del-btn').style.display='';
  buildModalColorPicker(ev.color||0);
  document.getElementById('event-modal').classList.add('show');
}

function closeEventModal(){
  document.getElementById('event-modal').classList.remove('show');
}

function saveEventModal(){
  const date = document.getElementById('em-date').value;
  const time = document.getElementById('em-time').value;
  const text = document.getElementById('em-text').value.trim();
  const note = document.getElementById('em-note').value.trim();
  if(!date||!time||!text) return;
  const events = loadEvents(date);
  if(modalMode==='add'){
    events.push({id:Date.now(),time,text,color:modalColor,done:false,note});
  } else {
    const ev=events.find(e=>e.id===modalEditId);
    if(ev){ ev.time=time; ev.text=text; ev.note=note; ev.color=modalColor; }
  }
  saveEventsArr(date, events);
  closeEventModal();
  // 移动时间段（如果从edit且日期改变）
  if(modalMode==='edit' && date!==modalEditDate){
    const orig=loadEvents(modalEditDate).filter(e=>e.id!==modalEditId);
    saveEventsArr(modalEditDate, orig);
  }
  refreshCurrentView();
  // 如果日详情是打开的，刷新它
  if(document.getElementById('day-detail-modal').classList.contains('show')){
    renderDayDetail(detailDate);
  }
}

function deleteModalEvent(){
  if(!confirm('确认删除？')) return;
  const events=loadEvents(modalEditDate).filter(e=>e.id!==modalEditId);
  saveEventsArr(modalEditDate, events);
  closeEventModal();
  refreshCurrentView();
  if(document.getElementById('day-detail-modal').classList.contains('show')){
    renderDayDetail(detailDate);
  }
}

document.getElementById('event-modal').addEventListener('click',e=>{
  if(e.target===document.getElementById('event-modal')) closeEventModal();
});
document.getElementById('em-text').addEventListener('keydown',e=>{if(e.key==='Enter') saveEventModal();});

// ══════════════════════════════════════════════════════════
// 日详情弹窗（从月视图点开）
// ══════════════════════════════════════════════════════════
let detailDate='';
function openDayDetail(date){
  detailDate=date;
  renderDayDetail(date);
  document.getElementById('day-detail-modal').classList.add('show');
}
function closeDayDetail(){
  document.getElementById('day-detail-modal').classList.remove('show');
}
function renderDayDetail(date){
  const events=loadEvents(date);
  document.getElementById('dd-title').textContent = formatDateCN(date);
  const list=document.getElementById('dd-list');
  if(events.length===0){
    list.innerHTML='<div style="text-align:center;padding:24px;color:var(--text-muted)">暂无事项</div>';
    return;
  }
  list.innerHTML=events.map(ev=>{
    const c=COLORS[ev.color||0];
    return `<div class="detail-item">
      <span class="detail-time">${ev.time}</span>
      <div style="width:4px;height:100%;border-radius:2px;background:${c.bg};flex-shrink:0;min-height:18px;margin:0 6px 0 0;"></div>
      <span class="detail-text${ev.done?' done-text':''}">${escHtml(ev.text)}</span>
      <div class="detail-actions">
        <button class="icon-btn" title="${ev.done?'取消完成':'完成'}" onclick="toggleDetailDone('${date}',${ev.id})">${ev.done?'↩':'✓'}</button>
        <button class="icon-btn" title="编辑" onclick="closeDayDetail();openEditEventModal('${date}',${ev.id})">✏️</button>
        <button class="icon-btn del-btn" title="删除" onclick="deleteDetailEvent('${date}',${ev.id})">🗑</button>
      </div>
    </div>`;
  }).join('');
}
function toggleDetailDone(date,id){
  const events=loadEvents(date);
  const ev=events.find(e=>e.id===id);
  if(ev) ev.done=!ev.done;
  saveEventsArr(date,events);
  renderDayDetail(date);
  refreshCurrentView();
}
function deleteDetailEvent(date,id){
  if(!confirm('确认删除？')) return;
  const events=loadEvents(date).filter(e=>e.id!==id);
  saveEventsArr(date,events);
  renderDayDetail(date);
  refreshCurrentView();
}
function openAddFromDetail(){
  closeDayDetail();
  openAddEventModal(detailDate,'');
}
document.getElementById('day-detail-modal').addEventListener('click',e=>{
  if(e.target===document.getElementById('day-detail-modal')) closeDayDetail();
});

// ══════════════════════════════════════════════════════════
// 刷新当前视图
// ══════════════════════════════════════════════════════════
function refreshCurrentView(){
  if(currentView==='day') renderDay();
  if(currentView==='week') renderWeek();
  if(currentView==='month') renderMonth();
}

// ══════════════════════════════════════════════════════════
// 日视图
// ══════════════════════════════════════════════════════════
let currentDate = todayStr();

function changeDay(d){ currentDate=dateAdd(currentDate,d); renderDay(); }
function goToday(){ currentDate=todayStr(); renderDay(); }
function pickDate(v){ if(v){ currentDate=v; renderDay(); } }

function defaultTimeStr(){
  const now=new Date();
  const m=now.getMinutes()<30?'00':'30';
  return `${String(now.getHours()).padStart(2,'0')}:${m}`;
}

function addDayEvent(){
  const time=document.getElementById('inp-time').value;
  const text=document.getElementById('inp-text').value.trim();
  if(!time||!text){ (text?document.getElementById('inp-time'):document.getElementById('inp-text')).style.borderColor='#c0392b'; return; }
  const events=loadEvents(currentDate);
  events.push({id:Date.now(),time,text,color:dayColor,done:false,note:''});
  saveEventsArr(currentDate,events);
  document.getElementById('inp-text').value='';
  renderDay();
}
document.getElementById('inp-text').addEventListener('keydown',e=>{ if(e.key==='Enter') addDayEvent(); });

function toggleDayDone(id){
  const events=loadEvents(currentDate);
  const ev=events.find(e=>e.id===id);
  if(ev) ev.done=!ev.done;
  saveEventsArr(currentDate,events);
  renderDay();
}
function deleteDayEvent(id){
  if(!confirm('确认删除？')) return;
  saveEventsArr(currentDate,loadEvents(currentDate).filter(e=>e.id!==id));
  renderDay();
}

function renderDay(){
  document.getElementById('day-date-display').textContent=formatDateCN(currentDate);
  document.getElementById('date-picker').value=currentDate;
  const events=loadEvents(currentDate);
  document.getElementById('stat-total').textContent=events.length;
  document.getElementById('stat-done').textContent=events.filter(e=>e.done).length;
  const tl=document.getElementById('timeline');
  if(!events.length){
    tl.innerHTML='<div class="empty-state"><div class="emoji">🌿</div><div>今天暂无事项</div></div>';
    return;
  }
  tl.innerHTML=events.map(ev=>{
    const c=COLORS[ev.color||0];
    return `<div class="event-item">
      <div class="time-col">${ev.time}</div>
      <div class="line-col"></div>
      <div class="event-card${ev.done?' done':''}" style="border-left-color:${c.bg}">
        <div class="event-body">
          <div class="event-text">${escHtml(ev.text)}</div>
          ${ev.note?`<div class="event-note">${escHtml(ev.note)}</div>`:''}
        </div>
        <div class="event-actions">
          <button class="icon-btn" title="${ev.done?'取消':'完成'}" onclick="toggleDayDone(${ev.id})">${ev.done?'↩':'✓'}</button>
          <button class="icon-btn" title="编辑" onclick="openEditEventModal('${currentDate}',${ev.id})">✏️</button>
          <button class="icon-btn del-btn" title="删除" onclick="deleteDayEvent(${ev.id})">🗑</button>
        </div>
      </div>
    </div>`;
  }).join('');
}

// ══════════════════════════════════════════════════════════
// 周视图
// ══════════════════════════════════════════════════════════
let currentWeekMonday = getMondayOf(todayStr());

function getMondayOf(dateStr){
  const d=new Date(dateStr+'T00:00:00');
  const day=d.getDay();
  d.setDate(d.getDate()-(day===0?6:day-1));
  return d.toISOString().slice(0,10);
}
function changeWeek(d){ currentWeekMonday=dateAdd(currentWeekMonday,d*7); renderWeek(); }
function goWeekToday(){ currentWeekMonday=getMondayOf(todayStr()); renderWeek(); }

function saveWeekNote(){
  const mon=currentWeekMonday;
  const val=document.getElementById('week-note-area').value;
  _store.setItem(weekNoteKey(mon,'note'),val);
}

function renderWeek(){
  const mon=currentWeekMonday;
  const sun=dateAdd(mon,6);
  document.getElementById('week-display').textContent=
    `${mon.slice(0,7).replace('-','年')}月  第${getWeekNum(mon)}周  (${mon.slice(5)}～${sun.slice(5)})`;
  // 周备注
  document.getElementById('week-note-area').value=_store.getItem(weekNoteKey(mon,'note'))||'';

  const grid=document.getElementById('week-grid');
  const today=todayStr();
  grid.innerHTML='';
  for(let i=0;i<7;i++){
    const date=dateAdd(mon,i);
    const events=loadEvents(date);
    const d=new Date(date+'T00:00:00');
    const isToday=date===today;
    const col=document.createElement('div');
    col.className='week-day-col';
    col.innerHTML=`
      <div class="week-day-header${isToday?' today-col':''}">
        <span class="day-num">${d.getDate()}</span>
        <span class="day-name">周${WEEKDAYS_CN[d.getDay()]}</span>
      </div>
      <div class="week-events" id="we-${date}">
        ${events.map(ev=>{
          const c=COLORS[ev.color||0];
          return `<button class="week-event-chip${ev.done?' done-chip':''}"
            style="background:${c.bg}"
            onclick="openEditEventModal('${date}',${ev.id})"
            title="${ev.time} ${ev.text}">${ev.time} ${escHtml(ev.text)}</button>`;
        }).join('')}
        <button class="week-add-btn" onclick="openAddEventModal('${date}','')">＋</button>
      </div>`;
    grid.appendChild(col);
  }
}

function getWeekNum(dateStr){
  const d=new Date(dateStr+'T00:00:00');
  const start=new Date(d.getFullYear(),0,1);
  return Math.ceil(((d-start)/86400000+start.getDay()+1)/7);
}

// ══════════════════════════════════════════════════════════
// 月视图
// ══════════════════════════════════════════════════════════
let currentYear=new Date().getFullYear();
let currentMonth=new Date().getMonth();

function changeMonth(d){
  currentMonth+=d;
  if(currentMonth>11){ currentMonth=0; currentYear++; }
  if(currentMonth<0){ currentMonth=11; currentYear--; }
  renderMonth();
}
function goMonthToday(){ currentYear=new Date().getFullYear(); currentMonth=new Date().getMonth(); renderMonth(); }

function saveMonthNote(){
  const ym=`${currentYear}-${String(currentMonth+1).padStart(2,'0')}`;
  _store.setItem(monthNoteKey(ym), document.getElementById('month-note-area').value);
}

function renderMonth(){
  const ym=`${currentYear}-${String(currentMonth+1).padStart(2,'0')}`;
  document.getElementById('month-display').textContent=`${currentYear}年 ${currentMonth+1}月`;
  document.getElementById('month-note-area').value=_store.getItem(monthNoteKey(ym))||'';

  // 星期标题
  const wdEl=document.getElementById('month-weekdays');
  wdEl.innerHTML=['一','二','三','四','五','六','日'].map(d=>`<div class="month-weekday">周${d}</div>`).join('');

  const firstDay=new Date(currentYear,currentMonth,1).getDay(); // 0=Sun
  const daysInMonth=new Date(currentYear,currentMonth+1,0).getDate();
  const prevDays=new Date(currentYear,currentMonth,0).getDate();
  const startOffset=(firstDay===0)?6:(firstDay-1); // 周一为第一列
  const today=todayStr();

  const grid=document.getElementById('month-grid');
  grid.innerHTML='';

  // 填充前置天
  for(let i=startOffset-1;i>=0;i--){
    const d=prevDays-i;
    const date=`${currentYear}-${String(currentMonth).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
    grid.appendChild(makeMonthCell(date, true, today));
  }
  // 本月
  for(let d=1;d<=daysInMonth;d++){
    const date=`${currentYear}-${String(currentMonth+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
    grid.appendChild(makeMonthCell(date, false, today));
  }
  // 填充后置天
  const total=startOffset+daysInMonth;
  const rows=Math.ceil(total/7);
  const trailing=rows*7-total;
  for(let d=1;d<=trailing;d++){
    const date=`${currentYear}-${String(currentMonth+2).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
    grid.appendChild(makeMonthCell(date, true, today));
  }
}

function makeMonthCell(date, otherMonth, today){
  const events=loadEvents(date);
  const isToday=date===today;
  const d=new Date(date+'T00:00:00').getDate();
  const MAX=3;
  const cell=document.createElement('div');
  cell.className='month-cell'+(otherMonth?' other-month':'')+(isToday?' today-cell':'');
  cell.onclick=()=>openDayDetail(date);

  const dotsHtml=events.slice(0,MAX).map(ev=>{
    const c=COLORS[ev.color||0];
    return `<div class="month-dot${ev.done?' done-dot':''}" style="background:${c.bg}" title="${ev.time} ${ev.text}">${ev.time} ${escHtml(ev.text)}</div>`;
  }).join('');
  const moreHtml=events.length>MAX?`<div class="month-more">还有 ${events.length-MAX} 条…</div>`:'';

  cell.innerHTML=`
    <div class="month-day-num">${d}</div>
    <div class="month-dot-list">${dotsHtml}${moreHtml}</div>`;
  return cell;
}

// ══════════════════════════════════════════════════════════
// 初始化
// ══════════════════════════════════════════════════════════
(function(){
  try { document.getElementById('inp-time').value=defaultTimeStr(); } catch(e){}
  renderDay();
})();
</script>
